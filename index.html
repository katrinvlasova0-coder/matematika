<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Звёздная математика</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, Arial, sans-serif; background: #0d1550; color: #fff; }
button {
  font-family: -apple-system, Arial, sans-serif;
  touch-action: manipulation;
  -webkit-tap-highlight-color: transparent;
  cursor: pointer;
}
.page { display: none; max-width: 520px; margin: 0 auto; padding: 24px 16px 40px; }

/* ── WELCOME ── */
.rocket    { text-align: center; font-size: 72px; padding: 20px 0 8px; line-height: 1.1; }
.title     { font-size: 26px; font-weight: 800; text-align: center; color: #f9d423; margin-bottom: 6px; }
.subtitle  { font-size: 15px; text-align: center; color: rgba(255,255,255,.55); margin-bottom: 28px; }
.sec-lbl   { font-size: 11px; text-transform: uppercase; letter-spacing: 2px; color: rgba(255,255,255,.4); text-align: center; margin-bottom: 12px; }
.tbl-wrap  { text-align: center; margin-bottom: 12px; }
.tbtn {
  display: inline-block; width: 68px; height: 52px;
  line-height: 52px; margin: 4px; text-align: center; vertical-align: top;
  border: 2px solid rgba(255,255,255,.28); border-radius: 14px;
  background: rgba(255,255,255,.09); color: #fff;
  font-size: 16px; font-weight: 700;
  -webkit-appearance: none; appearance: none; padding: 0;
}
.tbtn.on { background: #c0392b; border-color: #e74c3c; }
.preset-wrap { text-align: center; margin: 12px 0 16px; }
.pbtn {
  display: inline-block; margin: 4px; padding: 9px 13px; vertical-align: top;
  border: 1px solid rgba(255,255,255,.22); border-radius: 10px;
  background: rgba(255,255,255,.08); color: rgba(255,255,255,.85);
  font-size: 13px; -webkit-appearance: none; appearance: none;
}
.hint { text-align: center; font-size: 13px; color: rgba(255,255,255,.4); margin-bottom: 16px; min-height: 20px; }
.go-btn {
  display: block; width: 100%; padding: 20px;
  font-size: 18px; font-weight: 700; border: none; border-radius: 18px;
  background: #5c35c8; color: #fff;
  -webkit-appearance: none; appearance: none;
}
.go-btn:active { background: #4a2aa0; }

/* ── GAME ── */
.g-head   { display: table; width: 100%; margin-bottom: 12px; }
.g-stars  { display: table-cell; font-size: 16px; font-weight: 700; width: 60px; vertical-align: middle; }
.g-track  { display: table-cell; vertical-align: middle; padding: 0 10px; }
.g-bar    { height: 8px; background: rgba(255,255,255,.15); border-radius: 99px; overflow: hidden; }
.g-fill   { height: 100%; background: #f9d423; border-radius: 99px; width: 0%; }
.g-qnum   { display: table-cell; font-size: 13px; color: rgba(255,255,255,.5); width: 50px; text-align: right; vertical-align: middle; }
.streak   { text-align: center; font-size: 14px; font-weight: 600; color: #fbbf24; height: 22px; margin-bottom: 8px; }
.q-card   { background: rgba(255,255,255,.09); border: 1px solid rgba(255,255,255,.14); border-radius: 22px; padding: 28px 20px 20px; text-align: center; margin-bottom: 14px; }
.q-badge  { display: inline-block; padding: 3px 14px; border-radius: 99px; background: rgba(255,255,255,.1); font-size: 11px; color: rgba(255,255,255,.45); margin-bottom: 14px; }
.q-main   { font-size: 52px; font-weight: 900; letter-spacing: 4px; line-height: 1; margin-bottom: 8px; }
.q-note   { font-size: 13px; color: rgba(255,255,255,.35); height: 18px; }
.ans-wrap { text-align: center; margin: 0 -4px 10px; }
.abtn {
  display: inline-block; width: calc(50% - 10px); height: 70px;
  line-height: 70px; margin: 5px; text-align: center; vertical-align: top;
  font-size: 28px; font-weight: 900; padding: 0;
  border: 2px solid rgba(255,255,255,.2); border-radius: 16px;
  background: rgba(255,255,255,.09); color: #fff;
  -webkit-appearance: none; appearance: none;
}
.abtn.ok  { background: #1a7a2e !important; border-color: #4caf50 !important; }
.abtn.err { background: #a31515 !important; border-color: #ef5350 !important; }
.abtn.rev { background: #155a1a !important; border-color: #4caf50 !important; }
.fb-row   { text-align: center; font-size: 16px; font-weight: 600; min-height: 24px; padding: 2px 0 4px; }
.fb-ok    { color: #86efac; }
.fb-err   { color: #fca5a5; }

/* ── RESULT ── */
.res-wrap  { text-align: center; padding: 10px 0; }
.res-emo   { font-size: 72px; line-height: 1.1; margin-bottom: 12px; }
.res-title { font-size: 22px; font-weight: 800; margin-bottom: 10px; }
.res-big   { font-size: 52px; font-weight: 900; color: #f9d423; line-height: 1; margin-bottom: 4px; }
.res-lbl   { font-size: 14px; color: rgba(255,255,255,.45); margin-bottom: 14px; }
.res-stars { font-size: 40px; letter-spacing: 8px; margin-bottom: 14px; }
.res-total { background: rgba(249,212,35,.12); border: 1px solid rgba(249,212,35,.3); border-radius: 12px; padding: 10px 14px; font-size: 14px; margin-bottom: 14px; }
.res-hard  { background: rgba(255,255,255,.07); border-radius: 12px; padding: 12px 14px; margin-bottom: 18px; text-align: left; }
.res-hard-lbl { font-size: 11px; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,.4); margin-bottom: 8px; }
.chip      { display: inline-block; background: rgba(239,68,68,.28); border: 1px solid rgba(239,68,68,.5); border-radius: 8px; padding: 4px 10px; font-size: 14px; font-weight: 600; margin: 3px; }
.again-btn { display: block; width: 100%; padding: 18px; font-size: 17px; font-weight: 700; border: none; border-radius: 16px; background: #e65100; color: #fff; margin-bottom: 10px; -webkit-appearance: none; appearance: none; }
.again-btn:active { background: #bf360c; }
.home-btn  { display: block; width: 100%; padding: 14px; font-size: 15px; font-weight: 600; border: 2px solid rgba(255,255,255,.25); border-radius: 16px; background: transparent; color: rgba(255,255,255,.8); -webkit-appearance: none; appearance: none; }
.home-btn:active { background: rgba(255,255,255,.1); }
.err-box   { background: #7f0000; border-radius: 10px; padding: 12px; margin-top: 12px; font-size: 13px; word-break: break-all; }
</style>
</head>
<body>

<!-- PAGE 0: WELCOME -->
<div id="p0" class="page" style="display:block">
  <div class="rocket">🚀</div>
  <div class="title">Звёздная математика</div>
  <div class="subtitle">Отвечай правильно — собирай звёзды!</div>

  <div class="sec-lbl">Выбери таблицы для тренировки</div>
  <div class="tbl-wrap">
    <button class="tbtn on" id="t2"  onclick="tgl(2)">×2</button>
    <button class="tbtn"    id="t3"  onclick="tgl(3)">×3</button>
    <button class="tbtn"    id="t4"  onclick="tgl(4)">×4</button>
    <button class="tbtn on" id="t5"  onclick="tgl(5)">×5</button>
    <button class="tbtn"    id="t6"  onclick="tgl(6)">×6</button>
    <button class="tbtn"    id="t7"  onclick="tgl(7)">×7</button>
    <button class="tbtn"    id="t8"  onclick="tgl(8)">×8</button>
    <button class="tbtn"    id="t9"  onclick="tgl(9)">×9</button>
    <button class="tbtn on" id="t10" onclick="tgl(10)">×10</button>
  </div>

  <div class="preset-wrap">
    <button class="pbtn" onclick="preset(0)">⭐ Лёгкие ×2,5,10</button>
    <button class="pbtn" onclick="preset(1)">🔥 Средние ×3,4,6</button>
    <button class="pbtn" onclick="preset(2)">💪 Сложные ×7,8,9</button>
    <button class="pbtn" onclick="preset(3)">🌟 Все</button>
  </div>

  <div class="hint" id="hintEl">Выбрано: ×2, ×5, ×10</div>
  <button class="go-btn" id="goBtn" onclick="startGame()">🚀 Полетели!</button>
  <div class="err-box" id="errBox" style="display:none"></div>
</div>

<!-- PAGE 1: GAME -->
<div id="p1" class="page">
  <div class="g-head">
    <div class="g-stars" id="gStars">⭐ 0</div>
    <div class="g-track"><div class="g-bar"><div class="g-fill" id="gFill"></div></div></div>
    <div class="g-qnum"  id="gQnum">1 / 10</div>
  </div>
  <div class="streak" id="gStreak"></div>
  <div class="q-card">
    <div class="q-badge" id="qBadge">Таблица ×2</div>
    <div class="q-main"  id="qMain">— × — = ?</div>
    <div class="q-note"  id="qNote"></div>
  </div>
  <div class="ans-wrap" id="ansWrap"></div>
  <div class="fb-row"   id="fbRow"></div>
</div>

<!-- PAGE 2: RESULT -->
<div id="p2" class="page">
  <div class="res-wrap">
    <div class="res-emo"   id="rEmo">🏆</div>
    <div class="res-title" id="rTitle">Отлично!</div>
    <div class="res-big"   id="rScore">10</div>
    <div class="res-lbl">из 10 правильных ответов</div>
    <div class="res-stars" id="rStars">⭐⭐⭐</div>
    <div class="res-total">Всего звёзд: <b id="rTotal">0</b> ⭐</div>
    <div class="res-hard" id="rHard" style="display:none">
      <div class="res-hard-lbl">Потренируй ещё:</div>
      <div id="rChips"></div>
    </div>
  </div>
  <button class="again-btn" onclick="again()">🔄 Ещё раунд!</button>
  <button class="home-btn"  onclick="goHome()">🏠 Выбрать таблицы</button>
</div>

/* ── FART SOUND (MP3 sample) ── */
function playFart() {
  try {
    var a = document.getElementById('fartAudio');
    a.currentTime = 0;
    a.play();
  } catch(e) {}
}

var PRESETS = [
  [2,5,10],
  [3,4,6],
  [7,8,9],
  [2,3,4,5,6,7,8,9,10]
];
var sel     = [2,5,10];

/* ── PAGE SWITCH ── */
function showPage(id) {
  document.getElementById('p0').style.display = (id === 'p0') ? 'block' : 'none';
  document.getElementById('p1').style.display = (id === 'p1') ? 'block' : 'none';
  document.getElementById('p2').style.display = (id === 'p2') ? 'block' : 'none';
}

/* ── TABLE SELECT ── */
function tgl(t) {
  var btn = document.getElementById('t' + t);
  var found = false;
  for (var i = 0; i < sel.length; i++) {
    if (sel[i] === t) { sel.splice(i, 1); found = true; break; }
  }
  if (!found) sel.push(t);
  btn.className = found ? 'tbtn' : 'tbtn on';
  updHint();
}

function preset(idx) {
  sel = PRESETS[idx].slice();
  for (var t = 2; t <= 10; t++) {
    var has = false;
    for (var i = 0; i < sel.length; i++) if (sel[i] === t) { has = true; break; }
    document.getElementById('t' + t).className = has ? 'tbtn on' : 'tbtn';
  }
  updHint();
}

function updHint() {
  var el = document.getElementById('hintEl');
  if (sel.length === 0) {
    el.textContent = 'Выбери хотя бы одну таблицу!';
    return;
  }
  var s = sel.slice().sort(function(a, b) { return a - b; });
  var txt = 'Выбрано:';
  for (var i = 0; i < s.length; i++) txt += ' ×' + s[i];
  el.textContent = txt;
}

/* ── HELPERS ── */
function ri(n) { return Math.floor(Math.random() * n); }

function shuffle(a) {
  for (var i = a.length - 1; i > 0; i--) {
    var j = ri(i + 1);
    var tmp = a[i]; a[i] = a[j]; a[j] = tmp;
  }
  return a;
}

function inSel(v) {
  for (var i = 0; i < sel.length; i++) if (sel[i] === v) return true;
  return false;
}

/* ── QUESTION GENERATION ── */
function makeOpts(ans, a, b) {
  var s = [ans];
  var cands = [];
  cands.push(ans + 1); cands.push(ans - 1);
  cands.push(ans + 2); cands.push(ans - 2);
  cands.push(ans + a); cands.push(ans - a);
  cands.push(ans + b); cands.push(ans - b);
  cands.push((a + 1) * b); cands.push(a * (b + 1));
  cands.push((a - 1) * b); cands.push(a * (b - 1));
  shuffle(cands);
  for (var i = 0; i < cands.length; i++) {
    if (s.length >= 4) break;
    var c = cands[i];
    if (c > 0 && c !== ans) {
      var dup = false;
      for (var d = 0; d < s.length; d++) if (s[d] === c) { dup = true; break; }
      if (!dup) s.push(c);
    }
  }
  var tries = 0;
  while (s.length < 4 && tries < 100) {
    tries++;
    var v = ans + ri(20) - 10;
    if (v < 1) v = ans + ri(10) + 1;
    var dup2 = false;
    for (var e = 0; e < s.length; e++) if (s[e] === v) { dup2 = true; break; }
    if (!dup2) s.push(v);
  }
  return shuffle(s);
}

function buildQs() {
  var pool = [];
  /* repeat wrong answers */
  for (var r = Math.max(0, wrongQ.length - 3); r < wrongQ.length; r++) {
    pool.push({ a: wrongQ[r].a, b: wrongQ[r].b, ans: wrongQ[r].ans, rep: true });
  }
  /* fresh questions */
  var extras = [];
  var need = (N - pool.length) * 6;
  for (var j = 0; j < need; j++) {
    var tbl = sel[ri(sel.length)];
    var num = ri(9) + 2;
    var a = (Math.random() < 0.5) ? tbl : num;
    var b = (a === tbl) ? num : tbl;
    extras.push({ a: a, b: b, ans: a * b, rep: false });
  }
  shuffle(extras);
  var needed = N - pool.length;
  for (var k = 0; k < needed && k < extras.length; k++) {
    pool.push(extras[k]);
  }
  shuffle(pool);
  qs = [];
  for (var m = 0; m < N && m < pool.length; m++) {
    var q = pool[m];
    qs.push({ a: q.a, b: q.b, ans: q.ans, rep: q.rep, opts: makeOpts(q.ans, q.a, q.b) });
  }
}

/* ── GAME FLOW ── */
function startGame() {
  try {
    if (sel.length === 0) {
      document.getElementById('hintEl').textContent = '⚠️ Выбери хотя бы одну таблицу!';
      return;
    }
    document.getElementById('goBtn').textContent = '⏳ Загружаем...';
    score = 0; cur = 0; streak = 0; rStars = 0; busy = false;
    buildQs();
    showPage('p1');
    showQ();
  } catch(e) {
    document.getElementById('goBtn').textContent = '🚀 Полетели!';
    document.getElementById('errBox').style.display = 'block';
    document.getElementById('errBox').textContent = 'Ошибка: ' + e.message;
  }
}

function showQ() {
  if (cur >= qs.length) { showResult(); return; }
  busy = false;
  var q = qs[cur];

  /* progress */
  document.getElementById('gFill').style.width = Math.round(cur / N * 100) + '%';
  document.getElementById('gQnum').textContent  = (cur + 1) + ' / ' + N;
  document.getElementById('gStars').textContent = '⭐ ' + rStars;
  document.getElementById('gStreak').textContent = streak >= 3 ? '🔥 ' + streak + ' подряд!' : '';

  /* badge */
  var badgeParts = [];
  if (inSel(q.a)) badgeParts.push('×' + q.a);
  if (inSel(q.b) && q.b !== q.a) badgeParts.push('×' + q.b);
  var badgeTxt = badgeParts.length ? badgeParts.join(', ') : '×' + (q.a < q.b ? q.a : q.b);
  document.getElementById('qBadge').textContent = 'Таблица ' + badgeTxt;
  document.getElementById('qMain').textContent  = q.a + ' × ' + q.b + ' = ?';
  document.getElementById('qNote').textContent  = q.rep ? '🔁 Повторяем — ты ошибалась здесь!' : '';

  document.getElementById('fbRow').textContent = '';
  document.getElementById('fbRow').className   = 'fb-row';

  /* answer buttons — use data-idx, single global handler */
  var wrap = document.getElementById('ansWrap');
  wrap.innerHTML = '';
  for (var i = 0; i < q.opts.length; i++) {
    var btn = document.createElement('button');
    btn.className = 'abtn';
    btn.textContent = String(q.opts[i]);
    btn.setAttribute('data-val', String(q.opts[i]));
    btn.setAttribute('onclick', 'pickAns(this)');
    wrap.appendChild(btn);
  }
}

function pickAns(btn) {
  if (busy) return;
  busy = true;

  var chosen = parseInt(btn.getAttribute('data-val'), 10);
  var q = qs[cur];
  var wrap = document.getElementById('ansWrap');
  var btns = wrap.getElementsByTagName('button');

  for (var i = 0; i < btns.length; i++) btns[i].disabled = true;

  var ok = (chosen === q.ans);

  for (var j = 0; j < btns.length; j++) {
    var v = parseInt(btns[j].getAttribute('data-val'), 10);
    if (v === chosen) {
      btns[j].className = 'abtn ' + (ok ? 'ok' : 'err');
    } else if (!ok && v === q.ans) {
      btns[j].className = 'abtn rev';
    }
  }

  var fb = document.getElementById('fbRow');
  if (ok) {
    score++; streak++; rStars++; allSt++;
    playFart();
    document.getElementById('gStars').textContent = '⭐ ' + rStars;
    var msgs = ['🌟 Отлично!', '✨ Правильно!', '🎉 Супер!', '💫 Молодец!', '🚀 Верно!', '⭐ Класс!'];
    fb.textContent  = msgs[ri(msgs.length)] + (streak >= 3 ? ' 🔥' : '');
    fb.className    = 'fb-row fb-ok';
    /* remove from wrong queue */
    for (var r = 0; r < wrongQ.length; r++) {
      if (wrongQ[r].a === q.a && wrongQ[r].b === q.b) { wrongQ.splice(r, 1); break; }
    }
  } else {
    streak = 0;
    fb.textContent = 'Правильный ответ: ' + q.ans;
    fb.className   = 'fb-row fb-err';
    var key = (q.a < q.b ? q.a : q.b) + '×' + (q.a < q.b ? q.b : q.a);
    hardMap[key] = (hardMap[key] || 0) + 1;
    var found = false;
    for (var w = 0; w < wrongQ.length; w++) {
      if (wrongQ[w].a === q.a && wrongQ[w].b === q.b) { found = true; break; }
    }
    if (!found) wrongQ.push({ a: q.a, b: q.b, ans: q.ans });
  }

  setTimeout(function() { cur++; showQ(); }, ok ? 950 : 1600);
}

/* ── RESULT ── */
function showResult() {
  document.getElementById('gFill').style.width = '100%';
  var pct = score / N;
  var s3  = (pct === 1) ? 3 : (pct >= 0.7) ? 2 : (pct >= 0.5) ? 1 : 0;

  var tiers = [
    {min:10, e:'🏆', t:'Ты настоящая звезда!'},
    {min:8,  e:'🌟', t:'Отличный результат!'},
    {min:6,  e:'😊', t:'Хорошо! Ещё немного!'},
    {min:4,  e:'💪', t:'Продолжай тренироваться!'},
    {min:0,  e:'🚀', t:'Начало положено — летим дальше!'}
  ];
  var tier = tiers[tiers.length - 1];
  for (var i = 0; i < tiers.length; i++) {
    if (score >= tiers[i].min) { tier = tiers[i]; break; }
  }

  document.getElementById('rEmo').textContent   = tier.e;
  document.getElementById('rTitle').textContent = tier.t;
  document.getElementById('rScore').textContent = score;
  document.getElementById('rTotal').textContent = allSt;

  var stars = '';
  for (var st = 0; st < 3; st++) stars += (st < s3 ? '⭐' : '☆');
  document.getElementById('rStars').textContent = stars;

  /* hard multiplications */
  var hard = [];
  for (var k in hardMap) {
    if (hardMap.hasOwnProperty(k)) hard.push([k, hardMap[k]]);
  }
  hard.sort(function(a, b) { return b[1] - a[1]; });

  var hb = document.getElementById('rHard');
  if (hard.length > 0) {
    hb.style.display = 'block';
    var chips = '';
    for (var h = 0; h < hard.length && h < 8; h++) {
      chips += '<span class="chip">' + hard[h][0] + '</span> ';
    }
    document.getElementById('rChips').innerHTML = chips;
  } else {
    hb.style.display = 'none';
  }

  showPage('p2');
}

function again() {
  score = 0; cur = 0; streak = 0; rStars = 0; busy = false;
  document.getElementById('rHard').style.display = 'none';
  buildQs();
  showPage('p1');
  showQ();
}

function goHome() {
  document.getElementById('rHard').style.display = 'none';
  document.getElementById('goBtn').textContent = '🚀 Полетели!';
  showPage('p0');
}
</script>
